<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>

    <!-- Styles -->
    <link href="css/styles.css" rel="stylesheet">
    <link href="css/element.style.css" rel="stylesheet">
    <link href="css/color.styles.css" rel="stylesheet">
    <link href="css/util.style.css" rel="stylesheet">
    <link href="css/debug.style.css" rel="stylesheet">
    
    <link href="css/navbar.style.css" rel="stylesheet">
    
    <link href="css/pages/projects.style.css" rel="stylesheet">
</head>
<body>
    <nav></nav>


    <main class="flex flex-row">
        <!-- SEARCH & FILTER -->
        <div id="filter-div" class="secondary-bg">
            <section id="filter-section">
                <div class="query flex">
                    <div class="search">
                        <input type="text" id="project-search" placeholder="Search projects...">
                    </div>
                    <div class="filters">
                        <h2 class="margin-top-[20px]">Tools</h2>
                        <div id="tool-filters"></div>
                        <h2>Categories</h2>
                        <div id="category-filters" class=""></div>
                        <p style="color:rgb(255, 200, 225); font-weight: 600;">(Search and filters not implemented yet)</p>
                    </div>
                </div>
            </section>
        </div>

        <!-- RESULTS -->
        <section id="results-section" class="padding-[0px]">
            <h1 class="padding-[0px-4vw]">Results</h1>
            <div id="results"></div>
        </section>
    </main>
    
    <template id ="project-template">
        <div class="project hover-rise">
            <div class="hover-overlay background-color-[rgba(140,30,180,0.2)]"></div>
            <div class="project-img-container">
                <img class="project-img" src="">
            </div>
            <div class="project-caption">
                <h3 class="project-title">Project Name</h3>
                <div class="project-text-container">
                    <p class="project-desc">Description</p>
                    <p class="project-tools">Tools</p>
                </div>
            </div>
        </div>
    </template>
    
    <!-- Components -->
    <script src="src/components/navbar.js"></script>

    <!-- Scripts -->
    <script src="src/darkmode.js"></script>
    <script src="src/nav-scroll.js"></script>
    <script src="src/css-utils.js"></script>

    <!-- Page Script -->
    <script type="module" src="src/pages/projects.js"></script>
</body>
</html>
